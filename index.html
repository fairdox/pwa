<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fret Trainer Pro</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; touch-action: none; font-family: sans-serif; color: white; }
        canvas { display: block; }
       
        .ui-layer { 
            position: absolute; 
            bottom: 15px; 
            left: 20px; 
            right: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            pointer-events: none; 
            z-index: 50; 
        }

        .btn-group { display: flex; gap: 8px; pointer-events: auto; }

        button { 
            padding: 8px 10px; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
        #menuTrigger {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
        }
        
        #sideMenu {
            position: fixed;
            top: 0;
            left: -280px; /* Hidden off-screen */
            width: 250px;
            height: 100%;
            background: rgba(30, 30, 30, 0.95);
            color: white;
            transition: 0.3s ease-in-out;
            z-index: 101;
            padding: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        
        #sideMenu.active {
            left: 0; /* Slide in */
        }
        
        .menu-items button {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            background: #333;
            color: #ddd;
            border: 1px solid #444;
            text-align: left;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .menu-items button:hover {
            background: #555;
            color: white;
        }
        #optionsMenuPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            color: white;
            text-align: center;
            padding-top: 50px;
            pointer-events: auto;
        }

        .option-row { margin: 25px 0; }
        .option-row label { font-size: 1.2em; cursor: pointer; }
        .option-row input { transform: scale(1.6); margin-right: 15px; vertical-align: middle; }
    </style>
</head>
<body>

<canvas id="fretboard"></canvas>

<button id="menuTrigger" onclick="toggleMenu(true)">☰</button>
<div id="sideMenu" class="menu-hidden">
    <div class="menu-header">
        <span>Select Mode</span>
        <button onclick="toggleMenu(false)">✕</button>
    </div>
    <div class="menu-items">
        <button onclick="switchGame('keyboard')">What's that note?</button>
        <button onclick="switchGame('extreme')">Intervals</button>
        <button onclick="switchGame('interval')">Missing note</button>
        <button onclick="switchGame('section')">Find note in section</button>
        <button onclick="switchGame('single')">Find note in a string</button>
        <button onclick="switchGame('chords')">Chord Speller</button>
        <button onclick="switchGame('IntSearch')">Interval search</button>      
        <button onclick="switchGame('show')">Fretboard slideshow</button>
        <button onclick="switchGame('scales1')">Scales</button>       
        <hr>
        <button id="optionsBtn" onclick="toggleMenu(false);toggleMenuPage(true);">Options...</button>
    </div>
</div>

<div id="optionsMenuPage">
    <h2>SETTINGS</h2>
    <div class="option-row">
        <label><input type="checkbox" id="debugToggle" onchange="game.showDebug = this.checked"> Show Debug Stats</label>
    </div>
    <div class="option-row">
        <label><input type="checkbox" id="historyToggle" onchange="game.showHistory = this.checked" checked> Show Fretboard Tap History </label>
    </div>
    <div class="option-row">
        <label><input type="checkbox" id="permission3D" onchange="requestOrientation(this.checked)" checked> 3D effect</label>
    </div>    
    
    <button onclick="toggleMenuPage(false)" style="margin-top:30px; padding:15px 40px; font-size: 1.1em; background: #444; border-radius: 10px;">CLOSE & RESUME</button>
    <br><br>
    <button onclick="clearFretStats()" style="background: #622; border-color: #844; font-size: 0.8em;">Clear All Progress</button>
    <div>
        <p id="game-info-display">Calculating...</p>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js?v=1.001"></script>
<script src="variants.js?v=1.829"></script>
<script src="scales.js?v=1.10"></script>
<script src="keyhelper.js?v=1.12"></script>
<script src="engine.js?v=1.001"></script>
<script>
let game = null;

async function startApp() {
    try {
        // 1. Fetch definitions via your db.js service
        forumlas = await dbService.getTheoryDefinitions(false);
        
        // 2. Initialize the engine with the injected data
        game = new FretboardEngine(document.getElementById('fretboard'), forumlas);

        // 3. start the game loop or UI rendering
        localStorage.getItem('lastGame') ? switchGame(localStorage.getItem('lastGame')) : switchGame('keyboard');
        game.draw();

    } catch (err) {
        console.error("Initialization failed:", err);
    }
}


function toggleMenuPage(show) {
    document.getElementById('optionsMenuPage').style.display = show ? 'block' : 'none';
    if (show) {
        document.getElementById('debugToggle').checked = game.showDebug;
        document.getElementById('historyToggle').checked = game.showHistory;
        document.getElementById('permission3D').checked = game.show3D;
    } 
}

async function requestOrientation(show) {
    game.show3D= show;
    if (! show) return;
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission === 'granted') {
            game.show3D= true;
        }else{
            game.show3D= false;
        }
    }
} 

function switchGame(type) {
    if (type === 'section') SectionVariant.range = null;
    game.viewHeightFactor=1.0;
    game.viewWidthFactor=0.8;    
    game.hasFret=true;
    game.autoPauseDuration=10000;
    if (game.variant) saveVariantState(game.variant);
    if (type === 'section' ) {
        game.variant = SectionVariant;
        game.autoPauseDuration = 3600000;
    }
    else if (type === 'single'  ) {
        game.variant = SingleStringVariant;
        game.viewWidthFactor=0.8;  
    }
    else if (type === 'interval') {
        game.variant = IntervalVariant;
        game.hasFret=false;
        game.autoPauseDuration=3600000;
    }
    else if (type === 'keyboard') {
        game.variant = KeyboardVariant;
        game.viewHeightFactor=0.8;

    }
    else if (type === 'extreme') {
        game.variant = ExtremeAccidentalVariant;
        game.hasFret=false;
        game.autoPauseDuration=3600000;
    }
    else if (type === 'chords') {
        game.variant = ChordCompletionVariant;
        game.autoPauseDuration=3600000;
        game.viewHeightFactor=0.84;
    }    
    else if (type === 'IntSearch') {
        game.variant = IntervalSearchVariant;
        game.autoPauseDuration=3600000;
        game.viewHeightFactor=0.84;
    } 
    else if (type === 'show') {
        game.variant = SlideShowVariant;
        game.autoPauseDuration=3600000;
    }    
    else if (type === 'scales1') {
        game.variant = ScalePathVariant;
        game.autoPauseDuration=3600000;
    }  
    
    game.calculateFrets() 
    toggleMenu(false); // Close the drawer after selection
    game.reset();
    localStorage.setItem('lastGame', type);
}

function toggleMenu(isOpen) {
    const menu = document.getElementById('sideMenu');
    if (isOpen) {
        game.isPaused = true;
        game.pauseTime = Date.now();
        menu.classList.add('active');
    } else {
        menu.classList.remove('active');
        game.isPaused = false;
        if (game.variant && game.variant.startTime) {
            game.variant.startTime += (Date.now() - game.pauseTime);
        }
    }
}

function clearFretStats() {
    if(confirm("Delete all progress?")) {
        dbService.clearLocalSorage();
        game.clearLocalSorage();
        game.stats = {};
        game.reset();
        toggleMenu(false);
    }
}

// Kick off the loading process
startApp();

// to start a server in command line : python -m http.server 8000
</script>
</body>
</html>
